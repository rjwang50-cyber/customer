<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="main-shell">
  <a href="/blog" class="btn btn-link px-0">Back</a>
  <article class="card card-soft p-4">
    <h1 class="h3" th:text="${post.title}">Title</h1>
    <p class="text-secondary" th:text="${post.summary}">Summary</p>
    <hr>
    <div style="white-space: pre-wrap" th:text="${post.content}">Content</div>
  </article>
</div>
</body>
</html>
