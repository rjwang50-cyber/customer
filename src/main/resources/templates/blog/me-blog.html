<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Blog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
  <div class="container-fluid main-shell py-2">
    <a class="navbar-brand" href="/me/blog">My Blog</a>
    <div class="d-flex flex-wrap gap-2">
      <a class="btn btn-outline-secondary touch-btn" href="/customers">Customers</a>
      <a class="btn btn-outline-secondary touch-btn" href="/mail/logs">Mail Logs</a>
      <a class="btn btn-outline-primary touch-btn" href="/blog">Public Blog</a>
      <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-danger touch-btn">Logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="main-shell">
  <div class="row g-3">
    <div class="col-12 col-lg-5">
      <div class="card card-soft p-3">
        <h2 class="h5">Write Post</h2>
        <form th:action="@{/me/blog}" method="post" th:object="${blogForm}">
          <input type="hidden" th:field="*{id}">
          <div class="mb-2">
            <label class="form-label">Title</label>
            <input class="form-control" th:field="*{title}" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Summary</label>
            <textarea class="form-control" th:field="*{summary}" rows="2"></textarea>
          </div>
          <div class="mb-2">
            <label class="form-label">Content</label>
            <textarea class="form-control" th:field="*{content}" rows="6" required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Visibility</label>
            <select class="form-select" th:field="*{visibility}">
              <option value="public">Public</option>
              <option value="internal">Internal</option>
            </select>
          </div>
          <div class="mobile-sticky">
            <button class="btn btn-primary w-100 touch-btn" type="submit">Save Draft</button>
          </div>
        </form>
      </div>
    </div>
    <div class="col-12 col-lg-7">
      <div class="card card-soft p-3">
        <h2 class="h5">My Posts</h2>
        <div class="list-group">
          <div class="list-group-item" th:each="post : ${posts}">
            <div class="d-flex justify-content-between align-items-center gap-2">
              <div>
                <div class="fw-semibold" th:text="${post.title}">title</div>
                <small class="text-secondary" th:text="${post.status}">draft</small>
              </div>
              <form th:action="@{|/me/blog/${post.id}/publish|}" method="post" th:if="${post.status != 'published'}">
                <button class="btn btn-sm btn-success touch-btn" type="submit">Publish</button>
              </form>
            </div>
          </div>
        </div>
        <nav class="mt-3" th:if="${totalPages > 1}">
          <ul class="pagination justify-content-center mb-0">
            <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
              <a class="page-link" th:href="@{/me/blog(page=${currentPage - 1},size=${size})}">Previous</a>
            </li>
            <li class="page-item disabled">
              <span class="page-link" th:text="|Page ${currentPage} / ${totalPages}|">Page 1 / 1</span>
            </li>
            <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
              <a class="page-link" th:href="@{/me/blog(page=${currentPage + 1},size=${size})}">Next</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
</div>
</body>
</html>
