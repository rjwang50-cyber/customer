<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mail Logs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="main-shell">
  <div class="d-flex flex-wrap gap-2 justify-content-between mb-3">
    <h1 class="h4 mb-0">Mail Logs</h1>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary touch-btn" href="/me/blog">My Blog</a>
      <form method="post" th:action="@{/mail/run-now}">
        <button class="btn btn-primary touch-btn" type="submit">Run Greeting Now</button>
      </form>
    </div>
  </div>

  <div class="card card-soft p-2 p-md-3">
    <div class="table-responsive">
      <table class="table align-middle">
        <thead>
        <tr>
          <th>To</th><th>Type</th><th>Holiday</th><th>Date</th><th>Status</th><th>Retry</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="l : ${logs}">
          <td th:text="${l.toEmail}">to</td>
          <td th:text="${l.sendType}">type</td>
          <td th:text="${l.holidayCode}">holiday</td>
          <td th:text="${l.targetDate}">date</td>
          <td th:text="${l.status}">status</td>
          <td th:text="${l.retryCount}">0</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <nav class="mt-3" th:if="${totalPages > 1}">
    <ul class="pagination justify-content-center">
      <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
        <a class="page-link" th:href="@{/mail/logs(page=${currentPage - 1},size=${size})}">Previous</a>
      </li>
      <li class="page-item disabled">
        <span class="page-link" th:text="|Page ${currentPage} / ${totalPages}|">Page 1 / 1</span>
      </li>
      <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
        <a class="page-link" th:href="@{/mail/logs(page=${currentPage + 1},size=${size})}">Next</a>
      </li>
    </ul>
  </nav>
</div>
</body>
</html>
