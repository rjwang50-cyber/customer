<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Customer Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="main-shell">
  <a class="btn btn-link px-0" href="/customers">Back to list</a>
  <div class="card card-soft p-3 p-md-4">
    <h1 class="h4 mb-3">Customer Form</h1>
    <form th:action="@{/customers}" method="post" th:object="${customerForm}">
      <input type="hidden" th:field="*{id}">
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <label class="form-label">Name</label>
          <input class="form-control" th:field="*{name}" required>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Phone</label>
          <input class="form-control" th:field="*{phone}">
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" th:field="*{email}">
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Birthday</label>
          <input class="form-control" type="date" th:field="*{birthday}">
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Social Platform</label>
          <input class="form-control" th:field="*{socialPlatform}" placeholder="wechat/linkedin/...">
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Social Account</label>
          <input class="form-control" th:field="*{socialAccount}">
        </div>
        <div class="col-12">
          <label class="form-label">Hobbies</label>
          <input class="form-control" th:field="*{hobbies}">
        </div>
        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea class="form-control" th:field="*{notes}" rows="4"></textarea>
        </div>
      </div>
      <div class="mobile-sticky mt-3">
        <button class="btn btn-primary w-100 touch-btn" type="submit">Save</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
