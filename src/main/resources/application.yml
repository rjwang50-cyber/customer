spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sg_customer_hub?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Singapore
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  thymeleaf:
    cache: false
  jackson:
    time-zone: Asia/Singapore
  mail:
    host: smtp.example.com
    port: 587
    username: your_smtp_username
    password: your_smtp_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
server:
  port: 8088

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.example.crm: info
