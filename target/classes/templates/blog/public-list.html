<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Public Blog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
  <div class="container-fluid main-shell py-2">
    <a class="navbar-brand" href="/blog">SG Customer Hub</a>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-primary touch-btn" href="/login">Employee Login</a>
    </div>
  </div>
</nav>
<div class="main-shell">
  <h1 class="h3 mb-3">Public Employee Blog</h1>
  <div class="grid-cards">
    <article class="card card-soft p-3" th:each="post : ${posts}">
      <h2 class="h5" th:text="${post.title}">Title</h2>
      <p class="text-secondary" th:text="${post.summary}">Summary</p>
      <a class="btn btn-sm btn-primary touch-btn" th:href="@{|/blog/${post.id}|}">Read</a>
    </article>
  </div>

  <nav class="mt-3" th:if="${totalPages > 1}">
    <ul class="pagination justify-content-center">
      <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
        <a class="page-link" th:href="@{/blog(page=${currentPage - 1},size=${size})}">Previous</a>
      </li>
      <li class="page-item disabled">
        <span class="page-link" th:text="|Page ${currentPage} / ${totalPages}|">Page 1 / 1</span>
      </li>
      <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
        <a class="page-link" th:href="@{/blog(page=${currentPage + 1},size=${size})}">Next</a>
      </li>
    </ul>
  </nav>
</div>
</body>
</html>
